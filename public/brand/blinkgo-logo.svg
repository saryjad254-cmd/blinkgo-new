<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Diagonal split gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#F5B819"/>
      <stop offset="100%" stop-color="#F5B819"/>
    </linearGradient>
    <!-- Box gradient -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <!-- Speed line gradient -->
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5B819" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F5B819" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#F5B819" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F5B819" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background with diagonal split (red top-left, yellow bottom-right) -->
  <rect width="1200" height="1200" fill="#F5B819"/>
  <polygon points="0,0 1200,0 1200,500 0,800" fill="#DC2626"/>

  <!-- Diagonal speed lines (yellow on red background) -->
  <g opacity="0.6">
    <polygon points="0,300 1200,0 1200,100 0,400" fill="#F5B819" opacity="0.5"/>
    <polygon points="0,500 1200,200 1200,250 0,550" fill="#F5B819" opacity="0.4"/>
    <polygon points="0,700 1200,400 1200,430 0,730" fill="#F5B819" opacity="0.3"/>
  </g>

  <!-- Diagonal speed lines (red on yellow background, left of rider) -->
  <g opacity="0.7">
    <polygon points="0,600 250,400 250,440 0,640" fill="#DC2626"/>
    <polygon points="0,650 350,450 350,490 0,690" fill="#DC2626"/>
    <polygon points="0,700 450,500 450,540 0,740" fill="#DC2626"/>
    <polygon points="0,750 550,550 550,590 0,790" fill="#DC2626"/>
  </g>

  <!-- Delivery box (black) with red B mark -->
  <g transform="translate(380, 320)">
    <!-- Box body -->
    <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#boxGrad)" stroke="#F5B819" stroke-width="3"/>
    <!-- Red B mark on box -->
    <text x="110" y="130" text-anchor="middle" fill="#DC2626" font-size="140" font-weight="900" font-style="italic" font-family="system-ui, sans-serif">B</text>
  </g>

  <!-- Rider body (black silhouette) -->
  <g transform="translate(620, 280)">
    <!-- Helmet -->
    <ellipse cx="120" cy="80" rx="55" ry="60" fill="#0A0A0A" stroke="#F5B819" stroke-width="3"/>
    <!-- Visor (orange/yellow) -->
    <path d="M 80,80 Q 120,110 160,80 L 155,100 Q 120,125 85,100 Z" fill="#F5B819"/>
    <!-- Body -->
    <path d="M 80,140 Q 100,200 130,260 L 180,260 Q 200,200 180,150 Z" fill="#0A0A0A"/>
    <!-- Arms reaching forward -->
    <path d="M 130,180 L 200,200 L 220,180 L 200,160 Z" fill="#0A0A0A"/>
    <!-- Legs -->
    <path d="M 110,260 L 100,340 L 140,340 L 145,260 Z" fill="#0A0A0A"/>
    <path d="M 150,260 L 155,340 L 195,340 L 200,260 Z" fill="#0A0A0A"/>
  </g>

  <!-- Scooter body -->
  <g transform="translate(550, 600)">
    <!-- Main scooter body -->
    <path d="M 50,80 Q 100,40 200,50 Q 350,60 500,80 L 520,140 Q 500,180 450,180 L 100,180 Q 50,150 50,80 Z" fill="#0A0A0A"/>
    <!-- Front fender curve -->
    <path d="M 50,80 Q 80,40 150,30 Q 200,30 220,60 L 200,80 Q 150,60 80,100 Z" fill="#0A0A0A"/>
    <!-- Headlight -->
    <ellipse cx="540" cy="100" rx="15" ry="20" fill="#F5B819" stroke="#0A0A0A" stroke-width="3"/>
  </g>

  <!-- Wheels (red with yellow center) -->
  <g>
    <!-- Back wheel -->
    <circle cx="660" cy="820" r="80" fill="#0A0A0A"/>
    <circle cx="660" cy="820" r="65" fill="#DC2626"/>
    <circle cx="660" cy="820" r="20" fill="#F5B819"/>
    <!-- Front wheel -->
    <circle cx="1000" cy="820" r="80" fill="#0A0A0A"/>
    <circle cx="1000" cy="820" r="65" fill="#DC2626"/>
    <circle cx="1000" cy="820" r="20" fill="#F5B819"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="830" cy="900" rx="500" ry="20" fill="#0A0A0A" opacity="0.3"/>

  <!-- BlinkGo wordmark -->
  <g transform="translate(0, 1000)">
    <text x="600" y="80" text-anchor="middle" font-size="180" font-weight="900" font-style="italic" font-family="system-ui, sans-serif" letter-spacing="-8">
      <tspan fill="#0A0A0A">Blink</tspan><tspan fill="#DC2626">Go</tspan>
    </text>
  </g>

  <!-- Speed line accents on wordmark -->
  <g opacity="0.8">
    <polygon points="160,980 280,950 290,960 170,990" fill="#DC2626"/>
    <polygon points="900,980 1020,950 1010,960 890,990" fill="#DC2626"/>
  </g>

  <!-- Tagline -->
  <g transform="translate(0, 1130)">
    <!-- Tagline decorative arrows -->
    <polygon points="280,-5 320,-5 310,5 290,5" fill="#DC2626"/>
    <polygon points="880,-5 920,-5 910,5 890,5" fill="#DC2626"/>
    <text x="600" y="15" text-anchor="middle" font-size="42" font-weight="700" font-family="system-ui, sans-serif" fill="#0A0A0A" letter-spacing="4">
      SCHNELL. ZUVERLÄSSIG. FÜR DICH.
    </text>
  </g>
</svg>
