# ─────────────────────────────────────────────────────────
# Network Policy - Restrict pod-to-pod traffic
# ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blinkgo-web
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: blinkgo
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
    # HTTPS to Supabase
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
    # Resend API
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
    # Google Maps
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
