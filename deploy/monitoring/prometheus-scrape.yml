# ─────────────────────────────────────────────────────────
# Prometheus Scrape Configuration for BlinkGo
# ─────────────────────────────────────────────────────────
# Add to your prometheus.yml scrape_configs:
#   - job_name: blinkgo
#     metrics_path: /api/metrics/prometheus
#     static_configs:
#       - targets: ['app.blinkgo.com:3000']

scrape_configs:
  - job_name: blinkgo
    metrics_path: /api/metrics/prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          service: blinkgo-web
          tier: production

  - job_name: blinkgo-health
    metrics_path: /api/health
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          service: blinkgo-web
          type: health
