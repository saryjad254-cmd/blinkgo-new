# ─────────────────────────────────────────────────────────
# BlinkGo CI/CD Pipeline
# ─────────────────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════
  # 1. Lint + Type Check
  # ════════════════════════════════════════
  lint:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ════════════════════════════════════════
  # 2. Build
  # ════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next
            public
          retention-days: 7

  # ════════════════════════════════════════
  # 3. Tests
  # ════════════════════════════════════════
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Customer Journey
        run: node scripts/customer-journey-test.js
        env:
          TEST_BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Admin Workflow
        run: node scripts/admin-workflow-test.js
        env:
          TEST_BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Edge Cases
        run: node scripts/edge-cases-test.js
        env:
          TEST_BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Security
        run: node scripts/security-test.js
        env:
          TEST_BASE_URL: ${{ secrets.STAGING_URL }}
      - name: Ops Acceptance
        run: node scripts/ops-acceptance-test.js
        env:
          TEST_BASE_URL: ${{ secrets.STAGING_URL }}

  # ════════════════════════════════════════
  # 4. Docker Build & Push (main only)
  # ════════════════════════════════════════
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            COMMIT_SHA=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  # ════════════════════════════════════════
  # 5. Deploy to Production (main only)
  # ════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    environment:
      name: production
      url: https://app.blinkgo.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying version ${{ github.sha }}..."
          # (uses kubeconfig stored in secrets)
      - name: Smoke test production
        run: |
          sleep 60
          curl -f https://app.blinkgo.com/api/health || exit 1
      - name: Notify
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"BlinkGo ${{ github.ref }} deploy: ${{ job.status }}\"
            }"
